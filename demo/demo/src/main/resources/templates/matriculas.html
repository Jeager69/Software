<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrículas - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <span>Registro de Matrículas</span>
                        
                        <form class="d-flex align-items-center gap-2 flex-wrap" th:action="@{/dashboard/matriculas}" method="get">

                            <select name="estado" class="form-select form-select-sm" style="width: auto;">
                                <option value="">Todos los estados</option>
                                <option value="ACTIVA" th:selected="${estado == 'ACTIVA'}">ACTIVA</option>
                                <option value="PENDIENTE" th:selected="${estado == 'PENDIENTE'}">PENDIENTE</option>
                                <option value="ANULADA" th:selected="${estado == 'ANULADA'}">ANULADA</option>
                            </select>

                            <select name="categoriaId" class="form-select form-select-sm" style="width: auto;">
                                <option value="">Todas las categorías</option>
                                <th:block th:each="cat : ${categorias}">
                                    <option th:value="${cat.idCategoria}" 
                                            th:text="${cat.nombreCategoria}"
                                            th:selected="${cat.idCategoria == categoriaId}">
                                    </option>
                                </th:block>
                            </select>

                            <input type="search" name="search" class="form-control form-control-sm" style="max-width: 220px;"
                                placeholder="Buscar por nombre" th:value="${search}" />
                            
                            <button type="submit" class="btn btn-sm btn-secondary">Buscar</button>
                        </form>
                    </div>
                    
                    <div class="card-body py-2" th:if="${(search != null and search != '') or categoriaId != null or (estado != null and estado != '')}">
                        <div class="small text-muted">
                            Resultados con filtros aplicados.
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Código Constancia</th>
                                    <th>Alumno</th>
                                    <th>Categoría</th>
                                    <th>Estado</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="matricula : ${matriculas}">
                                    <td class="fw-bold" th:text="${matricula.idMatricula}"></td>
                                    <td class="text-monospace small" th:text="${matricula.codigoConstancia}"></td>
                                    <td th:text="${matricula.alumno.nombreCompleto}"></td>
                                    <td th:text="${matricula.categoria.nombreCategoria}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${matricula.estado.name() == 'ACTIVA' ? 'bg-success' : (matricula.estado.name() == 'PENDIENTE' ? 'bg-warning text-dark' : 'bg-danger')}"
                                            th:text="${matricula.estado}">
                                        </span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-2 justify-content-center">
                                            <a th:href="@{/dashboard/registro/print/{id}(id=${matricula.idMatricula})}"
                                                class="btn btn-sm btn-outline-success">Ver</a>
                                            <a th:href="@{/dashboard/registro/{id}/edit(id=${matricula.idMatricula})}"
                                                class="btn btn-sm btn-outline-primary" 
                                                th:classappend="${matricula.estado.name() == 'ANULADA'} ? 'disabled' : ''">Editar</a> 
                                            
                                            <form th:action="@{/dashboard/matriculas/{id}/confirm(id=${matricula.idMatricula})}"
                                                method="post" th:if="${matricula.estado.name() == 'PENDIENTE'}">
                                                <button type="submit" class="btn btn-sm btn-accent-custom">Confirmar</button>
                                            </form>
                                            
                                            <form th:action="@{/dashboard/matriculas/{id}/cancel(id=${matricula.idMatricula})}"
                                                method="post">
                                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                                    th:disabled="${matricula.estado.name() == 'ANULADA'}">Anular</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
