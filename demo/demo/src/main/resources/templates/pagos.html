<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagos - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <span>Registro de Pagos</span>
                        
                        <form class="d-flex align-items-center gap-2 flex-wrap" th:action="@{/dashboard/pagos}" method="get">

                            <select name="metodo" class="form-select form-select-sm" style="width: auto;">
                                <option value="">Todos los metodos</option>
                                <option value="Efectivo" th:selected="${metodo == 'Efectivo'}">Efectivo</option>
                                <option value="Tarjeta" th:selected="${metodo == 'Tarjeta'}">Tarjeta</option>
                                <option value="Transferencia" th:selected="${metodo == 'Transferencia'}">Transferencia</option>
                                <option value ="Yape" th:selected="${metodo == 'Yape'}">Yape</option>
                            </select>

                            <input type="search" name="search" class="form-control form-control-sm" style="max-width: 220px;"
                                placeholder="Buscar por Id Matricula" th:value="${search}" />
                            
                            <button type="submit" class="btn btn-sm btn-secondary">Buscar</button>
                        </form>
                    </div>
                    
                    <div class="card-body py-2" th:if="${(search != null and search != '') or categoriaId != null or (estado != null and estado != '')}">
                        <div class="small text-muted">
                            Resultados con filtros aplicados.
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>ID Matricula</th>
                                    <th>Monto</th>
                                    <th>Vuelto</th>
                                    <th>Método pago</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pago : ${pagos}">
                                    <td class="fw-bold" th:text="${pago.idPago}"></td>
                                    <td class="text-secondary small" th:text="${pago.matricula.idMatricula}"></td>
                                    <td class="fw-bold text-success" th:text="'S/ ' + ${pago.monto}"></td>
                                    <td class="text-secondary small" th:text="${pago.vuelto}"></td>
                                    <td class="text-secondary small" th:text="${pago.metodoPago}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${pago.estadoPago.name() == 'PROCESADO' || pago.estadoPago.name() == 'APROBADO' ? 'bg-success' : 'bg-danger'}"
                                            th:text="${pago.estadoPago}"></span>
                                    </td>
                                    <td th:text="${pago.fechaPago}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
