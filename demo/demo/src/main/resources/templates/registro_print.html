<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Constancia de Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        @media print {
            .no-print { display: none !important; }
        }
        .constancia { max-width: 800px; margin: 2rem auto; border: 1px solid #e5e5e5; padding: 1.5rem; }
        .logo { font-weight: 700; color: #198754; }
    </style>
</head>
<body>
    <div class="constancia">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <div class="logo">Cancha Futbol - Constancia</div>
                <small class="text-muted">Registro de Matrícula</small>
            </div>
            <div class="text-end">
                <div th:text="${matricula.codigoConstancia}"></div>
                <small class="text-muted">Fecha: <span th:text="${#temporals.format(matricula.fechaMatricula, 'dd/MM/yyyy HH:mm')}"></span></small>
            </div>
        </div>

        <h4 class="mb-3">Datos del Alumno</h4>
        <div class="row mb-2">
            <div class="col-6"><strong>Nombre:</strong> <span th:text="${matricula.alumno.nombreCompleto}"></span></div>
            <div class="col-3"><strong>DNI:</strong> <span th:text="${matricula.alumno.dni}"></span></div>
            <div class="col-3"><strong>Fecha Nac.:</strong> <span th:text="${matricula.alumno.fechaNacimiento}"></span></div>
        </div>

        <h4 class="mt-3 mb-2">Detalles de Matrícula</h4>
        <div class="row mb-2">
            <div class="col-6"><strong>Categoría:</strong> <span th:text="${matricula.categoria != null ? matricula.categoria.nombreCategoria : 'Auto por edad'}"></span></div>
            <div class="col-3"><strong>Monto:</strong> <span th:text="${matricula.categoria != null ? 'S/ ' + matricula.categoria.montoMatricula : 'S/ 0.00'}"></span></div>
            <div class="col-3"><strong>Estado:</strong> <span th:text="${matricula.estado}"></span></div>
        </div>

        <h4 class="mt-3 mb-2">Pago</h4>
        <div class="row mb-4">
            <div class="col-6"><strong>N° Operación:</strong> <span th:text="${pago != null ? pago.numeroOperacion : 'No registrado'}"></span></div>
            <div class="col-6"><strong>Estado Pago:</strong> <span th:text="${pago != null ? pago.estadoPago : 'N/A'}"></span></div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-primary no-print" onclick="window.print()">Imprimir constancia</button>
            <a th:href="@{/dashboard?entity=matriculas}" class="btn btn-secondary no-print ms-2">Volver al dashboard</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
