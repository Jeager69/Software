<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes Avanzados - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>Reportes avanzados</span>
                        <span class="badge bg-info text-dark">Filtros por fecha</span>
                    </div>
                    <div class="card-body">
                        <form method="get" action="/dashboard/reportes"
                            class="row g-3 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label">Entidad</label>
                                <select class="form-select" name="reportEntity">
                                    <option value="matriculas" th:selected="${reportEntity == 'matriculas'}">
                                        Matrículas</option>
                                    <option value="pagos" th:selected="${reportEntity == 'pagos'}">Pagos
                                    </option>
                                    <option value="alumnos" th:selected="${reportEntity == 'alumnos'}">Alumnos
                                    </option>
                                    <option value="categorias" th:selected="${reportEntity == 'categorias'}">
                                        Categorías</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Fecha inicio</label>
                                <input type="date" class="form-control" name="startDate"
                                    th:value="${startDate}" />
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Fecha fin</label>
                                <input type="date" class="form-control" name="endDate" th:value="${endDate}" />
                            </div>
                            <div class="col-md-3 text-end">
                                <button class="btn btn-primary-custom w-100" type="submit">Aplicar
                                    filtro</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <a class="btn btn-accent-custom"
                                th:href="@{/dashboard/report(entity=${reportEntity},format='pdf',startDate=${startDate},endDate=${endDate})}">Descargar
                                PDF</a>
                        </div>
                        <div th:switch="${reportEntity}">
                            <div th:case="'alumnos'">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Nombre</th>
                                                <th>DNI</th>
                                                <th>Fecha nacimiento</th>
                                                <th>Correo tutor</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="alumno : ${reportAlumnos}">
                                                <td th:text="${alumno.idAlumno}"></td>
                                                <td th:text="${alumno.nombreCompleto}"></td>
                                                <td th:text="${alumno.dni}"></td>
                                                <td th:text="${alumno.fechaNacimiento}"></td>
                                                <td th:text="${alumno.correoTutor}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div th:case="'categorias'">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Nombre</th>
                                                <th>Monto</th>
                                                <th>Edad mínima</th>
                                                <th>Edad máxima</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="categoria : ${reportCategorias}">
                                                <td th:text="${categoria.idCategoria}"></td>
                                                <td th:text="${categoria.nombreCategoria}"></td>
                                                <td th:text="'S/ ' + ${categoria.montoMatricula}"></td>
                                                <td th:text="${categoria.edadMinima}"></td>
                                                <td th:text="${categoria.edadMaxima}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div th:case="'matriculas'">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Alumno</th>
                                                <th>Categoría</th>
                                                <th>Estado</th>
                                                <th>Fecha matrícula</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="matricula : ${reportMatriculas}">
                                                <td th:text="${matricula.idMatricula}"></td>
                                                <td th:text="${matricula.alumno.nombreCompleto}"></td>
                                                <td th:text="${matricula.categoria.nombreCategoria}"></td>
                                                <td th:text="${matricula.estado}"></td>
                                                <td th:text="${matricula.fechaMatricula}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div th:case="'pagos'">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Monto</th>
                                                <th>Método pago</th>
                                                <th>Estado</th>
                                                <th>Fecha pago</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="pago : ${reportPagos}">
                                                <td th:text="${pago.idPago}"></td>
                                                <td th:text="'S/ ' + ${pago.monto}"></td>
                                                <td th:text="${pago.metodoPago}"></td>
                                                <td th:text="${pago.estadoPago}"></td>
                                                <td th:text="${pago.fechaPago}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
