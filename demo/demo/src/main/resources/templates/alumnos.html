<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumnos - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">Registro de Alumnos</div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>DNI</th>
                                    <th>Fecha Nacimiento</th>
                                    <th>Tutor</th>
                                    <th>Correo Tutor</th>
                                    <th>Teléfono Tutor</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="alumno : ${alumnos}">
                                    <td class="fw-bold" th:text="${alumno.idAlumno}"></td>
                                    <td th:text="${alumno.nombreCompleto}"></td>
                                    <td th:text="${alumno.dni}"></td>
                                    <td th:text="${alumno.fechaNacimiento}"></td>
                                    <td th:text="${alumno.nombreTutor}"></td>
                                    <td th:text="${alumno.correoTutor}"></td>
                                    <td th:text="${alumno.telefonoTutor}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
