<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resumen - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="layout/header :: header"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="layout/sidebar :: sidebar"></div>

            <div class="col-lg-9">
                <div class="mb-4 d-flex justify-content-end">
                    <a class="btn btn-accent-custom btn-lg" href="/dashboard/registro">Registrar matrícula</a>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-sm-6 col-xl-3">
                        <div class="card shadow-sm border-start border-4"
                            style="border-left-color: var(--verde-principal) !important;">
                            <div class="card-body">
                                <h6 class="card-title text-secondary small text-uppercase fw-bold">Alumnos</h6>
                                <p class="display-6 fw-bold text-dark mb-0"><span
                                        th:text="${alumnoCount}">0</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card shadow-sm border-start border-4"
                            style="border-left-color: var(--verde-principal) !important;">
                            <div class="card-body">
                                <h6 class="card-title text-secondary small text-uppercase fw-bold">Categorías
                                </h6>
                                <p class="display-6 fw-bold text-dark mb-0"><span
                                        th:text="${categoriaCount}">0</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card shadow-sm border-start border-4"
                            style="border-left-color: var(--amarillo-acento) !important;">
                            <div class="card-body">
                                <h6 class="card-title text-secondary small text-uppercase fw-bold">Matrículas
                                </h6>
                                <p class="display-6 fw-bold text-dark mb-0"><span
                                        th:text="${matriculaCount}">0</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card shadow-sm border-start border-4"
                            style="border-left-color: var(--amarillo-acento) !important;">
                            <div class="card-body">
                                <h6 class="card-title text-secondary small text-uppercase fw-bold">Pagos</h6>
                                <p class="display-6 fw-bold text-dark mb-0"><span
                                        th:text="${pagoCount}">0</span></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        Vista general
                    </div>
                    <div class="card-body">
                        <p class="mb-0">Bienvenido al sistema administrativo. Selecciona una entidad desde el
                            menú superior para auditar los registros y aplicar las acciones de administración
                            del Sprint 1.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
