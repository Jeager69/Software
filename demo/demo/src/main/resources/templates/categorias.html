<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categorías - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    
    <meta th:if="${_csrf}" th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" th:name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>Registro de Categorías</span>
                        <button class="btn btn-sm btn-accent-custom" type="button" data-bs-toggle="collapse"
                            data-bs-target="#categoriaFormContainer" aria-expanded="false"
                            aria-controls="categoriaFormContainer">
                            Registrar nueva categoría
                        </button>
                    </div>
                    
                    <div class="collapse mb-4" id="categoriaFormContainer">
                        <div class="card card-body border-success">
                            <form id="formRegistrarCategoria">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Nombre categoría *</label>
                                        <input type="text" class="form-control" id="regNombre" placeholder="Ej. sub-12" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Edad mínima *</label>
                                        <input type="number" min="1" class="form-control" id="regMin" placeholder="10" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Edad máxima *</label>
                                        <input type="number" min="1" class="form-control" id="regMax" placeholder="12" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Monto *</label>
                                        <input type="number" min="0" step="0.01" class="form-control" id="regMonto" placeholder="100.00" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Cupos *</label>
                                        <input type="number" min="1" class="form-control" id="regCupos" placeholder="20" required />
                                    </div>
                                </div>
                                <div class="mt-3 text-end">
                                    <button type="submit" class="btn btn-success">Guardar categoría</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Rango Edad</th>
                                    <th>Monto</th>
                                    <th>Cupos Totales</th>
                                    <th>Cupos Disponibles</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="categoria : ${categorias}">
                                    <td class="fw-bold" th:text="${categoria.idCategoria}"></td>
                                    <td th:text="${categoria.nombreCategoria}"></td>
                                    <td><span th:text="${categoria.edadMinima}"></span> - <span th:text="${categoria.edadMaxima}"></span> años</td>
                                    <td class="fw-bold text-success" th:text="'S/ ' + ${categoria.montoMatricula}"></td>
                                    <td th:text="${categoria.cuposTotales}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${categoria.cuposDisponibles > 5} ? 'bg-success' : 'bg-danger'"
                                            th:text="${categoria.cuposDisponibles}"></span>
                                    </td>
                                    <td> 
                                        <div class="d-flex gap-2 justify-content-center">
                                            <button type="button" class="btn btn-sm btn-outline-primary btn-editar"
                                                    data-bs-toggle="modal" 
                                                    data-bs-target="#editModal"
                                                    th:data-id="${categoria.idCategoria}"
                                                    th:data-nombre="${categoria.nombreCategoria}"
                                                    th:data-min="${categoria.edadMinima}"
                                                    th:data-max="${categoria.edadMaxima}"
                                                    th:data-monto="${categoria.montoMatricula}"
                                                    th:data-totales="${categoria.cuposTotales}"
                                                    th:data-version="${categoria.version}"> Editar
                                            </button> 
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="editModalLabel">Editar Categoría</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-close="modal" aria-label="Close"></button>
                </div>
                <form id="formEditarCategoria">
                    <div class="modal-body">
                        <input type="hidden" id="editId" />
                        <input type="hidden" id="editCuposOriginales" />
                        <input type="hidden" id="editVersion" /> <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Nombre categoría *</label>
                                <input type="text" class="form-control" id="editNombre" required />
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Edad mínima *</label>
                                <input type="number" min="1" class="form-control" id="editMin" required />
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Edad máxima *</label>
                                <input type="number" min="1" class="form-control" id="editMax" required />
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Monto *</label>
                                <input type="number" min="0" step="0.01" class="form-control" id="editMonto" required />
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Cupos Totales *</label>
                                <input type="number" class="form-control" id="editCupos" required />
                                <div class="form-text text-danger fw-bold" id="cuposHelp"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const formRegistrar = document.getElementById("formRegistrarCategoria");
            const formEditar = document.getElementById("formEditarCategoria");

            function getHeaders() {
                const headers = { 'Content-Type': 'application/json' };
                const tokenMeta = document.querySelector("meta[name='_csrf']");
                const headerMeta = document.querySelector("meta[name='_csrf_header']");
                
                if (tokenMeta && headerMeta) {
                    headers[headerMeta.getAttribute("content")] = tokenMeta.getAttribute("content");
                }
                return headers;
            }

            // 1. CARGAR DATOS EN EL MODAL AL HACER CLIC
            document.body.addEventListener("click", function (e) {
                if (e.target && e.target.classList.contains("btn-editar")) {
                    const boton = e.target;
                    const cuposTotales = parseInt(boton.getAttribute("data-totales"));
                    
                    document.getElementById("editId").value = boton.getAttribute("data-id");
                    document.getElementById("editNombre").value = boton.getAttribute("data-nombre");
                    document.getElementById("editMin").value = boton.getAttribute("data-min");
                    document.getElementById("editMax").value = boton.getAttribute("data-max");
                    document.getElementById("editMonto").value = boton.getAttribute("data-monto");
                    document.getElementById("editVersion").value = boton.getAttribute("data-version"); // Asignar versión
                    
                    document.getElementById("editCupos").value = cuposTotales;
                    document.getElementById("editCuposOriginales").value = cuposTotales;
                    
                    document.getElementById("editCupos").setAttribute("min", cuposTotales);
                    document.getElementById("cuposHelp").innerText = `Mínimo actual: ${cuposTotales}`;
                }
            });

            // 2. ACCIÓN: REGISTRAR (POST)
            formRegistrar.addEventListener("submit", function (e) {
                e.preventDefault();

                const dataNueva = {
                    nombreCategoria: document.getElementById("regNombre").value,
                    edadMinima: parseInt(document.getElementById("regMin").value),
                    edadMaxima: parseInt(document.getElementById("regMax").value),
                    montoMatricula: parseFloat(document.getElementById("regMonto").value),
                    cuposTotales: parseInt(document.getElementById("regCupos").value),
                    cuposDisponibles: parseInt(document.getElementById("regCupos").value)
                };

                fetch('/api/categorias', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(dataNueva)
                })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al registrar la categoría.");
                    }
                })
                .catch(error => console.error("Error:", error));
            });

            // 3. ACCIÓN: ACTUALIZAR (POST)
            formEditar.addEventListener("submit", function (e) {
                e.preventDefault();

                const id = document.getElementById("editId").value;
                const cuposOriginales = parseInt(document.getElementById("editCuposOriginales").value);
                const cuposNuevos = parseInt(document.getElementById("editCupos").value);
                const versionVal = document.getElementById("editVersion").value;

                if (cuposNuevos < cuposOriginales) {
                    alert(`No se permite disminuir los cupos totales. El mínimo es ${cuposOriginales}.`);
                    return;
                }
                
                const dataActualizada = {
                    idCategoria: parseInt(id), 
                    nombreCategoria: document.getElementById("editNombre").value,
                    edadMinima: parseInt(document.getElementById("editMin").value),
                    edadMaxima: parseInt(document.getElementById("editMax").value),
                    montoMatricula: parseFloat(document.getElementById("editMonto").value),
                    cuposTotales: cuposNuevos,
                    version: versionVal ? parseInt(versionVal) : null // ENVIAR LA VERSIÓN AL SERVIDOR
                };

                fetch(`/api/categorias/${id}`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(dataActualizada)
                })
                .then(async response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        const errorMsg = await response.text();
                        alert("Error desde el servidor: " + errorMsg);
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("Error de red o conexión.");
                });
            });
        });
    </script>
</body>
</html>
