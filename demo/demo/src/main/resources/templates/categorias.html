<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categorías - Academia Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body class="bg-light text-dark">
    <div th:replace="~{layout/header :: header}"></div>

    <div class="container-fluid mt-4">
        <div class="row">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>

            <div class="col-lg-9">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>Registro de Categorías</span>
                        <button class="btn btn-sm btn-accent-custom" type="button" data-bs-toggle="collapse"
                            data-bs-target="#categoriaFormContainer" aria-expanded="false"
                            aria-controls="categoriaFormContainer">
                            Registrar nueva categoría
                        </button>
                    </div>
                    <div class="collapse mb-4" id="categoriaFormContainer">
                        <div class="card card-body border-success">
                            <form th:action="@{/dashboard/categorias}" th:object="${newCategoria}"
                                method="post">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Nombre categoría *</label>
                                        <input type="text" class="form-control" th:field="*{nombreCategoria}"
                                            placeholder="Ej. sub-12" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Edad mínima *</label>
                                        <input type="number" min="1" class="form-control"
                                            th:field="*{edadMinima}" placeholder="10" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Edad máxima *</label>
                                        <input type="number" min="1" class="form-control"
                                            th:field="*{edadMaxima}" placeholder="12" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Monto *</label>
                                        <input type="number" min="0" step="0.01" class="form-control"
                                            th:field="*{montoMatricula}" placeholder="100.00" required />
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Cupos *</label>
                                        <input type="number" min="1" class="form-control"
                                            th:field="*{cuposTotales}" placeholder="20" required />
                                    </div>
                                </div>
                                <div class="mt-3 text-end">
                                    <button type="submit" class="btn btn-success">Guardar categoría</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Rango Edad</th>
                                    <th>Monto</th>
                                    <th>Cupos Totales</th>
                                    <th>Cupos Disponibles</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="categoria : ${categorias}">
                                    <td class="fw-bold" th:text="${categoria.idCategoria}"></td>
                                    <td th:text="${categoria.nombreCategoria}"></td>
                                    <td><span th:text="${categoria.edadMinima}"></span> - <span
                                            th:text="${categoria.edadMaxima}"></span> años</td>
                                    <td class="fw-bold text-success"
                                        th:text="'S/ ' + ${categoria.montoMatricula}"></td>
                                    <td th:text="${categoria.cuposTotales}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${categoria.cuposDisponibles > 5} ? 'bg-success' : 'bg-danger'"
                                            th:text="${categoria.cuposDisponibles}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
